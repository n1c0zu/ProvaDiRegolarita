<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ASI Regolarità</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #008080;
    --win: #c0c0c0;
    --win-dark: #808080;
    --win-darker: #404040;
    --win-light: #ffffff;
    --win-title: #000080;
    --win-title-text: #ffffff;
    --text: #000000;
    --muted: #444444;
    --green: #008000;
    --red: #cc0000;
    --accent: #000080;
    --inset-bg: #ffffff;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'MS Sans Serif', 'Pixelated MS Sans Serif', Arial, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── Win98 raised border ── */
  .win-raised {
    border-top: 2px solid var(--win-light);
    border-left: 2px solid var(--win-light);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
  }
  .win-sunken {
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-light);
    border-bottom: 2px solid var(--win-light);
  }
  .win-inset {
    border-top: 1px solid var(--win-dark);
    border-left: 1px solid var(--win-dark);
    border-right: 1px solid var(--win-light);
    border-bottom: 1px solid var(--win-light);
  }

  /* ── Window chrome ── */
  .win-window {
    background: var(--win);
    padding: 3px;
  }
  .win-titlebar {
    background: linear-gradient(to right, var(--win-title), #1084d0);
    color: var(--win-title-text);
    font-weight: bold;
    font-size: 13px;
    padding: 3px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 3px;
    user-select: none;
  }
  .win-titlebar-icon { font-size: 14px; margin-right: 4px; }
  .win-titlebar-left { display: flex; align-items: center; }

  /* ── Buttons ── */
  button, .add-btn, .start-btn, .tap-btn, .back-btn, .del-btn, .win-btn {
    touch-action: manipulation;
    cursor: pointer;
  }
  .win-btn {
    background: var(--win);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 4px 12px;
    border-top: 2px solid var(--win-light);
    border-left: 2px solid var(--win-light);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
    min-width: 75px;
    text-align: center;
  }
  .win-btn:active {
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-light);
    border-bottom: 2px solid var(--win-light);
    padding: 5px 11px 3px 13px;
  }

  /* ── Inputs ── */
  input.win-input {
    background: var(--inset-bg);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 3px 5px;
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-light);
    border-bottom: 2px solid var(--win-light);
    outline: none;
  }
  input.win-input:focus { outline: 1px dotted #000; outline-offset: -3px; }

  /* ══════ SETUP ══════ */
  #setup-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh; height: 100dvh;
    padding: 10px;
  }
  .setup-window {
    width: 100%;
    max-width: 420px;
    height: calc(100dvh - 20px);
    display: flex;
    flex-direction: column;
  }
  .setup-body {
    flex: 1 1 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
  }
  #tappe-list {
    flex: 1 1 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .tappa-row {
    background: var(--win);
    padding: 6px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-top: 1px solid var(--win-light);
    border-left: 1px solid var(--win-light);
    border-right: 1px solid var(--win-dark);
    border-bottom: 1px solid var(--win-dark);
  }
  .tappa-num { font-size: 12px; color: var(--muted); min-width: 22px; }
  .tappa-name-input { flex: 1; min-width: 0; }
  .time-input-wrap { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
  .time-mm, .time-ss { width: 38px; text-align: center; }
  .time-sep { font-weight: bold; font-size: 15px; color: var(--muted); }
  .del-btn {
    background: var(--win);
    color: var(--red);
    font-size: 14px;
    font-weight: bold;
    padding: 1px 6px;
    border-top: 2px solid var(--win-light);
    border-left: 2px solid var(--win-light);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
    line-height: 1;
    flex-shrink: 0;
    border-radius: 0;
  }
  .setup-footer {
    display: flex;
    gap: 6px;
    padding: 6px 8px 8px;
    justify-content: flex-end;
    border-top: 1px solid var(--win-dark);
    flex-shrink: 0;
  }
  .add-btn {
    background: var(--win);
    color: var(--accent);
    font-family: inherit;
    font-size: 13px;
    padding: 4px 10px;
    border-top: 2px solid var(--win-light);
    border-left: 2px solid var(--win-light);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
  }
  .start-btn {
    background: var(--win);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    padding: 4px 18px;
    border-top: 2px solid var(--win-light);
    border-left: 2px solid var(--win-light);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
  }
  .start-btn:active, .add-btn:active {
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-light);
    border-bottom: 2px solid var(--win-light);
  }

  /* ══════ RACE ══════ */
  #race-screen {
    display: none;
    flex-direction: column;
    height: 100vh; height: 100dvh;
    background: var(--bg);
    padding: 6px;
    gap: 5px;
    overflow: hidden;
  }

  .race-window {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--win);
  }

  .race-header {
    padding: 4px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--win);
    flex-shrink: 0;
    border-bottom: 2px solid var(--win-dark);
  }
  .race-header-left { display: flex; flex-direction: column; }
  .race-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .race-tappa-name { font-size: 15px; font-weight: bold; color: var(--accent); }
  .race-progress { font-size: 12px; color: var(--muted); }

  .timer-area {
    flex: 1 1 0;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
    background: var(--inset-bg);
    overflow: hidden;
    padding: 8px 12px;
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-light);
    border-bottom: 2px solid var(--win-light);
    margin: 4px;
  }

  .timer-area.waiting-start .timer-display {
    animation: pulse-wait 1.4s ease-in-out infinite;
  }
  @keyframes pulse-wait {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .dtap-ring {
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    opacity: 0;
    pointer-events: none;
    transform: scale(0.4);
  }
  .dtap-ring.go { animation: dtap 0.45s ease-out forwards; }
  @keyframes dtap {
    0%   { opacity: 0.7; transform: scale(0.4); }
    100% { opacity: 0;   transform: scale(1.5); }
  }

  .timer-phase {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: bold;
    flex-shrink: 0;
    font-family: 'Consolas', 'Lucida Console', monospace;
  }
  .phase-ready     { color: var(--accent); }
  .phase-countdown { color: var(--green); }
  .phase-overtime  { color: var(--red); }
  .phase-done      { color: var(--muted); }

  .timer-display {
    font-weight: bold;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    line-height: 1;
    font-size: clamp(64px, 28vw, 160px);
    font-family: 'Consolas', 'Lucida Console', 'DejaVu Sans Mono', monospace;
    transition: color 0.1s;
  }
  @media (orientation: landscape) {
    .timer-display { font-size: clamp(64px, 38vh, 200px); }
  }

  .display-accent { color: var(--accent); }
  .display-green  { color: var(--green); }
  .display-red    { color: var(--red); }
  .display-done   { color: var(--muted); }

  .timer-ms {
    font-size: clamp(28px, 11vw, 70px);
    font-weight: bold;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    vertical-align: baseline;
    font-family: 'Consolas', 'Lucida Console', 'DejaVu Sans Mono', monospace;
  }
  @media (orientation: landscape) {
    .timer-ms { font-size: clamp(28px, 16vh, 90px); }
  }

  .timer-target { font-size: 16px; color: var(--muted); flex-shrink: 0; font-family: 'Consolas', 'Lucida Console', monospace; font-weight: bold; }
  .tap-hint { font-size: 15px; color: var(--muted); flex-shrink: 0; transition: color 0.15s; font-family: 'Consolas', 'Lucida Console', monospace; }
  .tap-hint.warn { color: var(--red); font-weight: bold; }

  /* Strip */
  .tappa-strip {
    background: var(--win);
    border-top: 2px solid var(--win-darker);
    padding: 5px 8px;
    display: flex;
    gap: 5px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .tappa-strip::-webkit-scrollbar { display: none; }
  .strip-item { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 44px; flex-shrink: 0; }
  .strip-dot {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold;
    border-top: 2px solid var(--win-light);
    border-left: 2px solid var(--win-light);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
  }
  .dot-done   { background: var(--green); color: #fff; }
  .dot-active {
    background: var(--accent); color: #fff;
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-light);
    border-bottom: 2px solid var(--win-light);
  }
  .dot-future { background: var(--win); color: var(--muted); }
  .strip-name { font-size: 9px; color: var(--muted); text-align: center; max-width: 44px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Tap zone */
  .tap-zone {
    background: var(--win);
    border-top: 2px solid var(--win-darker);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }
  .tap-btn {
    width: 100%;
    background: var(--win);
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    padding: 24px 16px;
    border-top: 2px solid var(--win-light);
    border-left: 2px solid var(--win-light);
    border-right: 2px solid var(--win-darker);
    border-bottom: 2px solid var(--win-darker);
    letter-spacing: 0.2px;
  }
  .tap-btn:active {
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-light);
    border-bottom: 2px solid var(--win-light);
    padding: 25px 15px 23px 17px;
  }
  .tap-btn.btn-done { color: var(--muted); }

  /* ── LIVE DELTA ── */
  .live-delta { font-size: 22px; font-weight: bold; font-variant-numeric: tabular-nums; flex-shrink: 0; min-height: 28px; font-family: 'Courier New', monospace; }
  .delta-pos  { color: var(--green); }
  .delta-neg  { color: var(--red); }
  .delta-zero { color: var(--muted); }

  /* ── RESULTS ── */
  #results-screen {
    position: absolute; inset: 0;
    background: var(--bg);
    flex-direction: column;
    overflow: hidden;
    padding: 6px;
    gap: 5px;
    z-index: 10;
  }
  .results-window {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--win);
  }
  #results-inner {
    flex: 1 1 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
  }
  .res-row {
    background: var(--win);
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    border-top: 2px solid var(--win-darker);
    border-left: 2px solid var(--win-darker);
    border-right: 2px solid var(--win-light);
    border-bottom: 2px solid var(--win-light);
  }
  .res-row-header { display: flex; align-items: center; justify-content: space-between; }
  .res-name { font-size: 13px; font-weight: bold; }
  .res-delta-big { font-size: 20px; font-weight: bold; font-variant-numeric: tabular-nums; font-family: 'Courier New', monospace; }
  .res-detail { display: flex; gap: 12px; font-size: 11px; color: var(--muted); font-family: 'Courier New', monospace; }
  .res-summary {
    background: var(--win);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    border-top: 2px solid var(--win-darker);
    margin: 0 6px 6px;
  }
  .res-summary-row { display: flex; justify-content: space-between; font-size: 13px; }
  .res-summary-row span:last-child { font-weight: bold; font-family: 'Courier New', monospace; }
  .results-footer { padding: 6px; flex-shrink: 0; }

  /* status bar */
  .statusbar {
    background: var(--win);
    border-top: 2px solid var(--win-darker);
    padding: 2px 8px;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    display: flex;
    gap: 8px;
  }
  .statusbar-item {
    border-top: 1px solid var(--win-darker);
    border-left: 1px solid var(--win-darker);
    border-right: 1px solid var(--win-light);
    border-bottom: 1px solid var(--win-light);
    padding: 1px 6px;
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .race-header { padding: 3px 8px; }
    .tappa-strip { padding: 3px 6px; }
    .strip-dot { width: 20px; height: 20px; font-size: 9px; }
    .tap-zone { padding: 5px 8px; }
    .tap-btn { padding: 14px 10px; font-size: 14px; }
  }
</style>
<style id="modern-theme" disabled>
  :root {
    --bg: #0f0f0f !important;
    --win: #1a1a1a !important;
    --win-dark: #333 !important;
    --win-darker: #000 !important;
    --win-light: #555 !important;
    --win-title: #6366f1 !important;
    --win-title-text: #ffffff !important;
    --text: #f0f0f0 !important;
    --muted: #888 !important;
    --green: #22c55e !important;
    --red: #ef4444 !important;
    --accent: #6366f1 !important;
    --inset-bg: #0f0f0f !important;
  }
  html, body { background: #0f0f0f !important; }
  .win-titlebar { background: #6366f1 !important; }
  .timer-area { background: #0f0f0f !important; }
  input.win-input { background: #242424 !important; color: #f0f0f0 !important; border-color: #555 !important; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-window win-window">
    <div class="win-titlebar">
      <div class="win-titlebar-left">[*] ASI Regolarita' - Configurazione</div>
    </div>
    <div class="setup-body">
      <div style="font-size:11px; color:var(--muted); margin-bottom:2px;">Tappe e tempi:</div>
      <div id="tappe-list"></div>
    </div>
    <div class="setup-footer">
      <button class="add-btn" onclick="addTappa()">[+] Aggiungi tappa</button>
      <button class="add-btn" id="theme-btn" onclick="toggleTheme()" style="color:var(--muted);">[T] Tema</button>
      <button class="start-btn" onclick="startRace()">[>] Avvia gara</button>
    </div>
  </div>
</div>

<div id="race-screen">
  <div class="race-window win-window">
    <div class="win-titlebar">
      <div class="win-titlebar-left">[>] ASI Regolarita' - Gara in corso</div>
      <span id="cur-progress" style="font-size:11px; font-weight:normal;"></span>
    </div>

    <div class="race-header">
      <div class="race-header-left">
        <span class="race-label">Tappa in corso</span>
        <span class="race-tappa-name" id="cur-name">—</span>
      </div>
    </div>

    <div class="timer-area" id="timer-area">
      <div class="dtap-ring" id="dtap-ring"></div>
      <span class="timer-phase" id="timer-phase">Pronto</span>
      <div class="timer-display" id="timer-display">00:00</div>
      <div class="timer-target" id="timer-target"></div>
      <div class="live-delta" id="live-delta"></div>
      <div class="tap-hint" id="tap-hint">[>] Tap per iniziare</div>
    </div>

    <div id="results-screen" style="display:none;">
      <div class="results-window win-window" style="flex:1 1 0; display:flex; flex-direction:column; overflow:hidden; margin:0;">
        <div class="win-titlebar">[=] Risultati gara</div>
        <div id="results-inner">
          <div id="results-list"></div>
        </div>
        <div class="res-summary" id="results-summary"></div>
      </div>
      <div class="results-footer">
        <button class="start-btn" onclick="goSetup()" style="width:100%;">[<] Nuova gara</button>
      </div>
    </div>

    <div class="tappa-strip" id="tappa-strip"></div>

    <div class="tap-zone">
      <button class="tap-btn" id="main-tap-btn">[>] Avvia tappa</button>
    </div>

    <div class="statusbar">
      <span class="statusbar-item" id="status-bar">Pronto</span>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'asi_tappe_v1';
const DTAP_MS = 380;

let tappe = [];
let tappaCount = 0;
let currentIdx = -1;
let rafId = null;
let startTime = null;
let elapsed = 0;
let finished = false;
let waitingForStart = false;
let firstTapAt = 0;
let hintResetTimer = null;
let tapResults = []; // {name, targetMs, elapsedMs, deltaMs}

/* ══════ AUDIO ══════ */
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Beep generico: freq Hz, durata ms, tipo onda, volume
function beep(freq, durationMs, type = 'sine', gain = 0.4) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const vol = ctx.createGain();
    osc.connect(vol);
    vol.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    vol.gain.setValueAtTime(gain, ctx.currentTime);
    vol.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationMs / 1000);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + durationMs / 1000);
  } catch(e) {}
}

// Suono avvio tappa: due toni brevi ascendenti
function soundStart() {
  beep(520, 80, 'sine', 0.3);
  setTimeout(() => beep(780, 100, 'sine', 0.35), 90);
}
// remainingSec: secondi rimasti (da totalMs della tappa)
// Mappa: tempo pieno = 880Hz, 0 = 300Hz
function soundTick(remainingSec, totalSec) {
  const t = totalSec > 0 ? Math.max(0, Math.min(1, remainingSec / totalSec)) : 0;
  const freq = 600 + t * 580; // 600Hz..1180Hz
  beep(freq, 80, 'sine', 0.32);
}
// Suono allo zero: doppio beep neutro
function soundZero() {
  beep(1320, 120, 'sine', 0.55);
  setTimeout(() => beep(1320, 180, 'sine', 0.55), 140);
}
// Tick in negativo: tono sale ogni secondo (più ritardo = più alto)
// overSec: secondi di ritardo (1, 2, 3...)
function soundOverTick(overSec) {
  const freq = 320 + Math.min(overSec, 20) * 40; // 360Hz..1120Hz
  beep(freq, 100, 'sawtooth', 0.22);
}

// Tracciamento secondi già suonati
let lastTickSecond = -1;   // secondo del countdown già suonato
let lastOverSecond = -1;   // secondo negativo già suonato
let zeroSounded    = false;

/* ══════ STORAGE ══════ */

function saveTappe() {
  try {
    const rows = document.querySelectorAll('.tappa-row');
    const data = [];
    rows.forEach(row => {
      const id = row.id.replace('tappa-row-', '');
      data.push({
        name: document.getElementById('name-' + id).value,
        mm:   document.getElementById('mm-' + id).value,
        ss:   document.getElementById('ss-' + id).value
      });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadSavedTappe() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!Array.isArray(data) || data.length === 0) return false;
    data.forEach(t => addTappa(t.name || '', t.mm || '', t.ss || ''));
    return true;
  } catch(e) { return false; }
}

/* ══════ SETUP ══════ */

function addTappa(name = '', mm = '', ss = '') {
  tappaCount++;
  const id = tappaCount;
  const div = document.createElement('div');
  div.className = 'tappa-row';
  div.id = 'tappa-row-' + id;
  div.innerHTML = `
    <span class="tappa-num">#${tappaCount}</span>
    <input class="tappa-name-input win-input" type="text" placeholder="Nome tappa" value="${name}" id="name-${id}">
    <div class="time-input-wrap">
      <input class="time-num time-mm win-input" type="number" min="0" max="99" placeholder="mm" value="${mm}" id="mm-${id}" inputmode="numeric">
      <span class="time-sep">:</span>
      <input class="time-num time-ss win-input" type="number" min="0" max="59" placeholder="ss" value="${ss}" id="ss-${id}" inputmode="numeric">
    </div>
    <button class="del-btn" onclick="removeTappa(${id})">✕</button>
  `;
  document.getElementById('tappe-list').appendChild(div);
  div.addEventListener('input', saveTappe);
}

function removeTappa(id) {
  const el = document.getElementById('tappa-row-' + id);
  if (el) el.remove();
  renumberTappe();
  saveTappe();
}

function renumberTappe() {
  document.querySelectorAll('.tappa-row').forEach((r, i) => {
    r.querySelector('.tappa-num').textContent = '#' + (i + 1);
  });
}

function getTappeFromForm() {
  const result = [];
  document.querySelectorAll('.tappa-row').forEach(row => {
    const id = row.id.replace('tappa-row-', '');
    const name = document.getElementById('name-' + id).value.trim() || ('Tappa ' + (result.length + 1));
    const mm = parseInt(document.getElementById('mm-' + id).value) || 0;
    const ss = parseInt(document.getElementById('ss-' + id).value) || 0;
    result.push({ name, totalMs: (mm * 60 + ss) * 1000 });
  });
  return result;
}

function startRace() {
  saveTappe();
  tappe = getTappeFromForm();
  if (tappe.length === 0) { alert('Aggiungi almeno una tappa!'); return; }
  for (const t of tappe) {
    if (t.totalMs <= 0) { alert('Imposta un tempo valido per ogni tappa.'); return; }
  }
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('race-screen').style.display = 'flex';
  finished = false;
  firstTapAt = 0;
  clearTimeout(hintResetTimer);
  currentIdx = -1;
  tapResults = [];
  buildStrip();
  prepareNextTappa();
}

/* ══════ RACE ══════ */

function buildStrip() {
  const strip = document.getElementById('tappa-strip');
  strip.innerHTML = '';
  tappe.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'strip-item';
    item.innerHTML = `<div class="strip-dot dot-future" id="dot-${i}">${i+1}</div><span class="strip-name">${t.name}</span>`;
    strip.appendChild(item);
  });
}

function updateStrip() {
  tappe.forEach((_, i) => {
    const dot = document.getElementById('dot-' + i);
    dot.className = 'strip-dot ' + (i < currentIdx ? 'dot-done' : i === currentIdx ? 'dot-active' : 'dot-future');
  });
  const activeDot = document.getElementById('dot-' + currentIdx);
  if (activeDot) activeDot.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

/* Mostra la tappa pronta — timer FERMO, aspetta tap */
function prepareNextTappa() {
  // Salva risultato tappa precedente
  if (currentIdx >= 0 && currentIdx < tappe.length) {
    const prev = tappe[currentIdx];
    const deltaMs = elapsed - prev.totalMs; // positivo = in ritardo, negativo = in anticipo
    tapResults.push({ name: prev.name, targetMs: prev.totalMs, elapsedMs: elapsed, deltaMs });
  }

  stopLoop();
  firstTapAt = 0;
  clearTimeout(hintResetTimer);

  currentIdx++;
  if (currentIdx >= tappe.length) { showFinish(); return; }

  // Solo la prima tappa aspetta il tap — le successive partono subito
  waitingForStart = (currentIdx === 0);
  elapsed = 0;
  startTime = null;
  finished = false;

  updateHeader();
  updateStrip();

  if (waitingForStart) {
    const t = tappe[currentIdx];
    const ts0 = Math.floor(t.totalMs / 1000);
    const mm0 = Math.floor(ts0 / 60);
    const ss0 = ts0 % 60;

    const disp = document.getElementById('timer-display');
    disp.innerHTML = pad(mm0) + ':' + pad(ss0);
    disp.className = 'timer-display display-accent';

    document.getElementById('timer-phase').textContent = 'Pronto';
    document.getElementById('timer-phase').className = 'timer-phase phase-ready';
    document.getElementById('timer-target').textContent = 'Tempo tappa: ' + pad(mm0) + ':' + pad(ss0);

    const hint = document.getElementById('tap-hint');
    hint.classList.remove('warn');
    hint.textContent = '[>] Tap per iniziare';

    document.getElementById('timer-area').classList.add('waiting-start');

    const btn = document.getElementById('main-tap-btn');
    btn.textContent = '[>] Avvia gara';
    btn.className = 'tap-btn';
  } else {
    // Tappe successive: parte subito
    startCurrentTappa();
  }
}

/* Avvia il cronometro della tappa corrente */
function startCurrentTappa() {
  waitingForStart = false;
  document.getElementById('timer-area').classList.remove('waiting-start');
  if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
  soundStart();
  // Reset sound state
  lastTickSecond = -1;
  lastOverSecond = -1;
  zeroSounded = false;
  elapsed = 0;
  startTime = performance.now();
  setHint();
  loop();
}

/* ── Listener area timer ── */
document.getElementById('timer-area').addEventListener('click', function(e) {
  if (finished) { goSetup(); return; }

  // Stato "pronto": singolo tap avvia
  if (waitingForStart) {
    startCurrentTappa();
    return;
  }

  // Timer in corso: doppio tap per avanzare
  const now = Date.now();
  const ring = document.getElementById('dtap-ring');

  if (firstTapAt > 0 && now - firstTapAt <= DTAP_MS) {
    firstTapAt = 0;
    clearTimeout(hintResetTimer);
    ring.classList.remove('go');
    prepareNextTappa();
  } else {
    firstTapAt = now;

    const rect = this.getBoundingClientRect();
    ring.style.left = (e.clientX - rect.left - 55) + 'px';
    ring.style.top  = (e.clientY - rect.top  - 55) + 'px';
    ring.classList.remove('go');
    void ring.offsetWidth;
    ring.classList.add('go');

    const hint = document.getElementById('tap-hint');
    hint.classList.add('warn');
    hint.textContent = '[>>] Ancora un tap!';

    clearTimeout(hintResetTimer);
    hintResetTimer = setTimeout(() => {
      firstTapAt = 0;
      hint.classList.remove('warn');
      setHint();
    }, DTAP_MS + 150);
  }
});

/* ── Bottone in basso ── */
document.getElementById('main-tap-btn').addEventListener('click', function() {
  if (finished) { goSetup(); return; }
  if (waitingForStart) { startCurrentTappa(); return; }
  firstTapAt = 0;
  clearTimeout(hintResetTimer);
  prepareNextTappa();
});

function stopLoop() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

function loop() {
  if (startTime !== null) elapsed = performance.now() - startTime;
  renderDisplay();
  rafId = requestAnimationFrame(loop);
}

function updateHeader() {
  const t = tappe[currentIdx];
  document.getElementById('cur-name').textContent = t.name;
  document.getElementById('cur-progress').textContent = (currentIdx + 1) + ' / ' + tappe.length;
  const sb = document.getElementById('status-bar');
  if (sb) sb.textContent = 'Tappa ' + (currentIdx+1) + ' di ' + tappe.length + ' - ' + t.name;
}

function setHint() {
  if (finished || currentIdx < 0 || currentIdx >= tappe.length) return;
  const hint = document.getElementById('tap-hint');
  hint.classList.remove('warn');
  const isLast = currentIdx === tappe.length - 1;
  hint.textContent = isLast ? '[>>] Doppio tap per terminare' : '[>>] Doppio tap o usa il bottone';
}

function renderDisplay() {
  if (currentIdx < 0 || currentIdx >= tappe.length) return;
  const t = tappe[currentIdx];
  const remaining = t.totalMs - elapsed;
  const isOver = remaining < 0;
  const absMs = Math.abs(remaining);

  const totalSec = Math.floor(absMs / 1000);
  const mm = Math.floor(totalSec / 60);
  const ss = totalSec % 60;
  const cs = Math.floor((absMs % 1000) / 10);

  const disp = document.getElementById('timer-display');
  const phase = document.getElementById('timer-phase');
  const target = document.getElementById('timer-target');
  const btn = document.getElementById('main-tap-btn');

  let html;
  if (mm === 0) {
    html = (isOver ? '+' : '') + pad(ss) + '.<span class="timer-ms">' + pad(cs) + '</span>';
  } else {
    html = (isOver ? '+' : '') + pad(mm) + ':' + pad(ss);
  }
  disp.innerHTML = html;

  const ts0 = Math.floor(t.totalMs / 1000);
  target.textContent = 'Tempo tappa: ' + pad(Math.floor(ts0 / 60)) + ':' + pad(ts0 % 60);

  if (!isOver) {
    disp.className = 'timer-display display-green';
    phase.textContent = 'Countdown';
    phase.className = 'timer-phase phase-countdown';

    // Tick ogni secondo
    if (lastTickSecond !== totalSec && elapsed > 1000) {
      lastTickSecond = totalSec;
      const totalTappaSec = Math.floor(t.totalMs / 1000);
      soundTick(totalSec, totalTappaSec);
    }

    // Suono zero anticipato di 250ms
    if (!zeroSounded && remaining <= 150) {
      zeroSounded = true;
      soundZero();
    }

  } else {
    disp.className = 'timer-display display-red';
    phase.textContent = 'Fuori tempo';
    phase.className = 'timer-phase phase-overtime';

    // Tick ogni secondo in negativo
    if (lastOverSecond !== totalSec) {
      lastOverSecond = totalSec;
      if (totalSec > 0) soundOverTick(totalSec);
    }
  }

  const isLast = currentIdx === tappe.length - 1;
  btn.textContent = isLast ? '[X] Termina gara' : '[>] Tappa successiva';
  btn.className = 'tap-btn';
}

function fmtDelta(dMs) {
  const sign = dMs > 0 ? '+' : dMs < 0 ? '-' : '±';
  const abs  = Math.abs(dMs);
  const sec  = Math.floor(abs / 1000);
  const cs   = Math.floor((abs % 1000) / 10);
  const mm   = Math.floor(sec / 60);
  const ss   = sec % 60;
  if (mm > 0) return sign + pad(mm) + ':' + pad(ss);
  return sign + pad(ss) + '.' + pad(cs);
}

function showFinish() {
  // Salva risultato ultima tappa
  if (currentIdx >= 0 && currentIdx < tappe.length) {
    const prev = tappe[currentIdx];
    tapResults.push({ name: prev.name, targetMs: prev.totalMs, elapsedMs: elapsed, deltaMs: elapsed - prev.totalMs });
  }

  stopLoop();
  finished = true;
  waitingForStart = false;
  document.getElementById('timer-area').classList.remove('waiting-start');
  if (navigator.vibrate) navigator.vibrate([40, 80, 40]);

  // Costruisci schermata risultati
  const list = document.getElementById('results-list');
  list.innerHTML = '';
  let totalDelta = 0;
  let totalAbs   = 0;
  tapResults.forEach((r, i) => {
    totalDelta += r.deltaMs;
    totalAbs   += Math.abs(r.deltaMs);
    const cls = r.deltaMs < -50 ? 'delta-pos' : r.deltaMs > 50 ? 'delta-neg' : 'delta-zero';
    const tSec = Math.floor(r.targetMs / 1000);
    const tCs  = Math.floor((r.targetMs % 1000) / 10);
    const eSec = Math.floor(r.elapsedMs / 1000);
    const eCs  = Math.floor((r.elapsedMs % 1000) / 10);
    const div = document.createElement('div');
    div.className = 'res-row';
    div.innerHTML = `
      <div class="res-row-header">
        <span class="res-name">#${i+1} ${r.name}</span>
        <span class="res-delta-big ${cls}">${fmtDelta(r.deltaMs)}</span>
      </div>
      <div class="res-detail">
        <span>Target: ${pad(Math.floor(tSec/60))}:${pad(tSec%60)}.${pad(tCs)}</span>
        <span>Effettivo: ${pad(Math.floor(eSec/60))}:${pad(eSec%60)}.${pad(eCs)}</span>
      </div>`;
    list.appendChild(div);
  });

  // Summary
  const sumCls = 'delta-neg';
  const avgAbs = tapResults.length ? totalAbs / tapResults.length : 0;
  document.getElementById('results-summary').innerHTML = `
    <div class="res-summary-row"><span>Errore totale</span><span class="${sumCls}">${fmtDelta(totalAbs)}</span></div>
    <div class="res-summary-row"><span>Errore medio per tappa</span><span>${fmtDelta(Math.round(avgAbs))}</span></div>
    <div class="res-summary-row"><span>Tappe completate</span><span>${tapResults.length} / ${tappe.length}</span></div>
  `;

  document.getElementById('results-screen').style.display = 'flex';
}

function goSetup() {
  stopLoop();
  finished = false;
  waitingForStart = false;
  firstTapAt = 0;
  clearTimeout(hintResetTimer);
  currentIdx = -1;
  document.getElementById('timer-area').classList.remove('waiting-start');
  document.getElementById('race-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

function pad(n) { return String(n).padStart(2, '0'); }

/* ══════ THEME ══════ */
let modernTheme = false;
function toggleTheme() {
  modernTheme = !modernTheme;
  const sheet = document.getElementById('modern-theme');
  sheet.disabled = !modernTheme;
  document.getElementById('theme-btn').textContent = modernTheme ? '[T] Win98' : '[T] Tema';
  document.body.style.background = modernTheme ? '#0f0f0f' : '';
}

if (!loadSavedTappe()) {
  addTappa('Partenza', '5', '0');
  addTappa('Checkpoint 1', '0', '45');
  addTappa('Arrivo', '6', '0');
}
</script>
